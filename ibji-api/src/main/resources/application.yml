server:
  port: 8080

spring:
  application:
    name: ibji-api

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/db_ibji
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true

  # JSON Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # CORS
  web:
    cors:
      # Desabilitado - usar configuração via SecurityConfig
      enabled: false

# JWT Configuration
app:
  jwt:
    secret: ibjiSecretKeyForJWTTokenGeneration2024SecureKey123456789012345678901234567890
    expiration: 86400000  # 24 horas em milissegundos

# Logging
logging:
  level:
    com.ibji.app: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
